# Example dataset configuration for ethibench.
# Each entry defines a subset of targets to evaluate.
# The target_id must match the directory name under each run folder.

- subset: Vulnbank
  weight: 1.0
  targets:
    - target_id: bank.xyyyz

- subset: PAYGoat
  weight: 1.0
  targets:
    - target_id: finance.xyyyz

- subset: TestApp
  weight: 1.0
  targets:
    - target_id: testapp.xyyyz

- subset: ChipChip
  weight: 1.0
  targets:
    - target_id: chipchip.xyyyz
