# File: .github/workflows/release.main.yaml
name: Release
run-name: "Release (SHA: ${{ github.sha }})"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==2.1.4

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            conventional-changelog-conventionalcommits

      - name: Rewrite README image URLs for PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.semantic.outputs.new_release_version }}
        run: |
          # Only affects the working-tree README used by poetry build;
          # nothing is committed back to git.
          sed -i \
            -e "s|src=\"assets/|src=\"${BASE}/assets/|g" \
            -e "s|](assets/|](${BASE}/assets/|g" \
            README.md

      - name: Build package
        if: steps.semantic.outputs.new_release_published == 'true'
        run: poetry build

      - name: Upload artifacts to GitHub Release
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.semantic.outputs.new_release_version }}" \
            dist/*.whl dist/*.tar.gz --clobber

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
